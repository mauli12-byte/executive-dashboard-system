<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExecIntel Dashboard</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- BOOTSTRAP ICONS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- GOOGLE FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- CUSTOM CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=3">

    <!-- CHART JS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- FULL CALENDAR -->
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css' rel='stylesheet' />

    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
</head>

<body>

    <!-- PAGE LOADER -->

    <div id="page-loader">

        <div class="loader-spinner"></div>

    </div>
    <!-- TOP NAVBAR -->
    <nav class="top-navbar">

        <!-- LEFT SIDE -->
        <div class="d-flex align-items-center">

            <!-- MOBILE MENU -->
            <button class="menu-toggle d-lg-none" id="menuToggle">
                <i class="bi bi-list"></i>
            </button>

            <!-- TITLE -->
            <h4 class="dashboard-title">
                Executive Intelligence Dashboard
            </h4>
        </div>

        <!-- RIGHT SIDE -->
        <div class="d-flex align-items-center gap-3">

            <!-- SEARCH -->
            <div class="search-box">
                <i class="bi bi-search"></i>
                <form action="/search-profile" method="GET" class="search-form">
                    <input type="text" name="query" placeholder="Search executive..." class="search-input">
                </form>

            </div>

            <!-- NOTIFICATION -->
            <i class="bi bi-bell-fill nav-icon"></i>

            <!-- PROFILE -->
            <i class="bi bi-person-circle profile-icon"></i>

        </div>
    </nav>

    <!-- PAGE LAYOUT -->
    <div class="page-layout">

        <!-- SIDEBAR -->
        <div class="sidebar p-3">
            <h3 class="logo mb-4">
                ExecIntel
            </h3>
            <ul class="nav flex-column">

                <!-- DASHBOARD -->
                <li class="nav-item mb-2">
                    <a href="/" class="nav-link {% if request.path == '/' %}active-link{% endif %}">
                        <i class="bi bi-speedometer2"></i>
                        Dashboard
                    </a>
                </li>

                <!-- EXECUTIVES -->
                <li class="nav-item mb-2">
                    <a href="/executives" class="nav-link {% if request.path == '/executives' %}active-link{% endif %}">
                        <i class="bi bi-people"></i>
                        Executives
                    </a>
                </li>

                <!-- COMPANIES -->
                <li class="nav-item mb-2">
                    <a href="/companies" class="nav-link {% if request.path == '/companies' %}active-link{% endif %}">
                        <i class="bi bi-building"></i>
                        Companies
                    </a>
                </li>

                <!-- OUTREACH -->
                <li class="nav-item mb-2">
                    <a href="/outreach" class="nav-link {% if request.path == '/outreach' %}active-link{% endif %}">
                        <i class="bi bi-telephone"></i>
                        Outreach
                    </a>
                </li>

                <!-- REPORTS -->
                <li class="nav-item mb-2">
                    <a href="/reports" class="nav-link {% if request.path == '/reports' %}active-link{% endif %}">
                        <i class="bi bi-graph-up-arrow"></i>
                        Reports
                    </a>
                </li>

                <!-- SETTINGS 
                <li class="nav-item mb-2">
                    <a href="/settings" class="nav-link {% if request.path == '/settings' %}active-link{% endif %}">
                        <i class="bi bi-gear"></i>
                        Settings
                    </a>
                </li>-->
            </ul>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content flex-grow-1">
            {% block content %}
            {% endblock %}
        </div>
    </div>

    <!-- SIDEBAR TOGGLE -->
    <script>
        const menuToggle =
            document.getElementById('menuToggle');
        const sidebar =
            document.querySelector('.sidebar');
        const sidebarLinks =
            document.querySelectorAll('.sidebar .nav-link');

        // TOGGLE SIDEBAR
        menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('active');
        });

        // AUTO CLOSE SIDEBAR ON MOBILE
        sidebarLinks.forEach(link => {
            link.addEventListener('click', () => {
                if (window.innerWidth <= 992) {
                    sidebar.classList.remove('active');
                }
            });
        });

    </script>
    <script>

        window.addEventListener(

            "load",

            function () {

                document.getElementById(
                    "page-loader"
                ).style.display = "none";

            }

        );

    </script>
</body>

</html>
